<!DOCTYPE html>
<html lang="en">
<head>
<meta name="base:app_id" content="69f44ca4bc3fc822ad442786" />  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Base Wallet Pro</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
  <h2>Base</h2>
  <div onclick="show('swap')">Swap</div>
  <div onclick="show('activity')">Activity</div>
</div>

<div class="main">

<h1>Base Wallet</h1>
<button onclick="connect()">Connect Wallet</button>

<div class="card">
  <p id="wallet">Not connected</p>
  <p>ETH: <span id="eth">--</span></p>
  <p>USDC: <span id="usdc">--</span></p>
</div>

<!-- SWAP -->
<div class="card section" id="swap">

  <div class="swap-box" onclick="openTokenModal('from')">
    <img id="fromIcon" width="20">
    <span id="fromTokenLabel">ETH</span>
    <input id="fromAmount" oninput="getQuote()" placeholder="0.0">
  </div>

  <button onclick="switchTokens()">⇅</button>

  <div class="swap-box" onclick="openTokenModal('to')">
    <img id="toIcon" width="20">
    <span id="toTokenLabel">USDC</span>
    <input id="toAmount" disabled placeholder="0.0">
  </div>

  <p id="rate"></p>
  <p id="minReceived"></p>
  <p id="gas"></p>

  <input id="slippage" value="0.5">

  <button onclick="executeSwap()">Swap</button>
</div>

<!-- ACTIVITY -->
<div class="card section" id="activity">
  <h3>Activity</h3>
  <div id="txs"></div>
</div>

<!-- TOKEN MODAL -->
<div id="tokenModal" class="modal">
  <div class="modal-content">
    <input placeholder="Search..." oninput="filterTokens(this.value)">
    <div id="tokenList"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
